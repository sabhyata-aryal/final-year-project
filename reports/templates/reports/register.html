<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        :root {
            --nccs-purple: #4d0aa8;
            --nccs-violet: #6d13b8;
            --nccs-magenta: #b40f88;
            --nccs-pink: #dd0f7a;
            --page: #f4f2fb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--page);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #1f2340;
        }

        .nccs-header {
            color: white;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.06) 18%, transparent 18%) 0 0/180px 180px,
                linear-gradient(35deg, rgba(255, 255, 255, 0.06) 16%, transparent 16%) 0 0/240px 240px,
                linear-gradient(120deg, var(--nccs-pink), var(--nccs-magenta) 28%, var(--nccs-violet) 60%, var(--nccs-purple));
        }

        .topbar {
            max-width: 1180px;
            margin: 0 auto;
            padding: 1rem;
        }

        .brand {
            color: white;
            text-decoration: none;
        }

        .brand-mark {
            font-size: clamp(2.4rem, 7vw, 4rem);
            line-height: 0.9;
            font-weight: 300;
            letter-spacing: 0.08em;
        }

        .brand-sub {
            margin-top: 0.4rem;
            font-size: 0.92rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .nav-row {
            display: flex;
            justify-content: flex-end;
            flex-wrap: wrap;
            gap: 1.6rem;
            margin-top: 1rem;
        }

        .nav-row a {
            color: white;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
        }

        .page {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 24px 48px;
        }

        .card {
            width: min(620px, 100%);
            background: rgba(255, 255, 255, 0.97);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 22px 50px rgba(61, 27, 120, 0.14);
        }

        h1 {
            margin-top: 0;
            color: #5c1496;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }

        .grid .full {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 0.45rem;
            font-weight: 700;
        }

        input,
        select {
            width: 100%;
            padding: 0.9rem 0.95rem;
            border-radius: 14px;
            border: 1px solid #d7c7ef;
            margin-bottom: 1rem;
        }

        .errorlist,
        .errorlist + ul {
            color: #b91c1c;
            padding-left: 1.2rem;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 0.95rem 1.2rem;
            background: linear-gradient(90deg, #7d14b8, #db157d);
            color: white;
            font-weight: 800;
            cursor: pointer;
        }

        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .nav-row {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
    <header class="nccs-header">
        <div class="topbar">
            <a class="brand" href="{% url 'home' %}">
                <div class="brand-mark">NCCS</div>
                <div class="brand-sub">College of IT &amp; Management</div>
            </a>
            <nav class="nav-row">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}">Register</a>
            </nav>
        </div>
    </header>

    <main class="page">
        <section class="card">
            <h1>Register</h1>
            <p>Create a teacher or student account for the NCCS plagiarism system.</p>

            <form method="post">
                {% csrf_token %}
                {{ form.non_field_errors }}

                <div class="grid">
                    {% for field in form %}
                    <div class="{% if field.name == 'email' or field.name == 'role' or field.name == 'password1' or field.name == 'password2' %}full{% endif %}">
                        {{ field.errors }}
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                    </div>
                    {% endfor %}
                </div>

                <button class="btn" type="submit">Register</button>
            </form>
        </section>
    </main>
</body>
</html>
