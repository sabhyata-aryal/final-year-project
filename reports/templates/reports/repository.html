<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository Reports</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }

        .wrap {
            max-width: 980px;
            margin: 0 auto;
            padding: 32px 16px 48px;
        }

        .panel {
            background: white;
            border-radius: 20px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
            padding: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 0.9rem;
            border-bottom: 1px solid #e2e8f0;
            text-align: left;
        }

        .btn {
            display: inline-flex;
            margin-top: 1.2rem;
            text-decoration: none;
            padding: 0.85rem 1.2rem;
            border-radius: 999px;
            font-weight: 700;
            background: #0f766e;
            color: white;
        }
    </style>
</head>
<body>
    <main class="wrap">
        <section class="panel">
            <h1>Teacher Repository</h1>
            {% if past_reports %}
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Uploaded At</th>
                    </tr>
                </thead>
                <tbody>
                    {% for report in past_reports %}
                    <tr>
                        <td>{{ report.title }}</td>
                        <td>{{ report.uploaded_at|date:"M d, Y H:i" }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% else %}
            <p>No repository reports are available yet.</p>
            {% endif %}

            <a class="btn" href="{% url 'teacher_dashboard' %}">Back to Dashboard</a>
        </section>
    </main>
</body>
</html>
